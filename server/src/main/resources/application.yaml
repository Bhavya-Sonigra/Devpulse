spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: devpulse

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/devpulse?options=-c%20timezone=Asia/Kolkata}
    username: ${SPRING_DATASOURCE_USERNAME:devpulse_user}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        time_zone: Asia/Kolkata

server:
  port: 8080

logging:
  level:
    com.devpulse: DEBUG
    org.hibernate.SQL: DEBUG

devpulse:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  jwt:
    secret: ${JWT_SECRET:}
  github:
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
  gemini:
    api-key: ${GEMINI_API_KEY:your-gemini-api-key}
    api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:your-slack-webhook-url}
    client-id: ${SLACK_CLIENT_ID:}
    client-secret: ${SLACK_CLIENT_SECRET:}
  scheduling:
    analysis-cron: "0 0 2 * * *"
    report-cron: "0 0 9 * * MON"