name: DevPulse CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: devpulse_test
          POSTGRES_USER: devpulse_user
          POSTGRES_PASSWORD: devpulse_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean compile -B

      - name: Run tests
        run: mvn test -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/devpulse_test
          SPRING_DATASOURCE_USERNAME: devpulse_user
          SPRING_DATASOURCE_PASSWORD: devpulse_pass
          GITHUB_WEBHOOK_SECRET: test-secret
          GEMINI_API_KEY: test-key
          SLACK_WEBHOOK_URL: https://hooks.slack.com/test

      - name: Build Docker image
        run: docker build -t devpulse:latest .