version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: devpulse-postgres
    environment:
      POSTGRES_DB: devpulse
      POSTGRES_USER: devpulse_user
      POSTGRES_PASSWORD: devpulse_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devpulse_user -d devpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: