version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: devpulse-postgres
    environment:
      POSTGRES_DB: devpulse
      POSTGRES_USER: devpulse_user
      POSTGRES_PASSWORD: devpulse_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devpulse_user -d devpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: devpulse-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/devpulse
      SPRING_DATASOURCE_USERNAME: devpulse_user
      SPRING_DATASOURCE_PASSWORD: devpulse_pass
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: